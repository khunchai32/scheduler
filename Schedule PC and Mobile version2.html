<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Peak Service Portal</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --peak-blue: #00315c; --peak-red: #ce1126; --peak-gray: #53565a; --peak-light: #f2f2f2; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--peak-light); padding: 15px; color: var(--peak-gray); }
        .form-container { max-width: 600px; margin: auto; background: white; padding: 25px; border-top: 6px solid var(--peak-blue); border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--peak-blue); margin-top: 0; font-weight: 700; text-transform: uppercase; font-size: 1.2em; border-bottom: 2px solid var(--peak-light); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row > div { flex: 1; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85em; color: var(--peak-blue); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; }
        .breakdown-box { display: none; background: #fff5f5; padding: 15px; border: 1px solid #ffe3e3; margin-bottom: 15px; border-radius: 4px; }
        button { width: 100%; padding: 16px; background-color: var(--peak-red); color: white; border: none; border-radius: 4px; font-size: 1em; font-weight: bold; cursor: pointer; text-transform: uppercase; -webkit-tap-highlight-color: transparent; }
        #finalContent { width: 100%; height: 250px; font-family: monospace; font-size: 14px; background: #fafafa; border: 1px solid #ddd; padding: 12px; margin-top: 10px; }
        .copy-hint { color: #28a745; font-weight: bold; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Service Request</h2>
    <div class="form-group"><label>Generator Model</label><input type="text" id="genModel"></div>
    <div class="form-group"><label>Serial Number</label><input type="text" id="serialNumber"></div>
    <div class="form-group">
        <div class="flex-row">
            <div>
                <label>Service Category</label>
                <select id="serviceType">
                    <option value="">-- Select --</option>
                    <option value="Complete Contract BD">Complete Contract BD</option>
                    <option value="Planned Maintenance">Planned Maintenance</option>
                    <option value="Installation">Installation</option>
                </select>
            </div>
            <div><label>Call Number</label><input type="text" id="callNumber"></div>
        </div>
    </div>

    <div id="breakdownSection" class="breakdown-box">
        <div class="form-group"><label>Symptom</label><select id="symptom"><option value="">-- Select --</option><option>Leak</option><option>Purity</option></select></div>
        <div class="form-group"><label>Informed Date</label><input type="datetime-local" id="informedDate"></div>
    </div>

    <div class="form-group"><label>Kit(s)/ Parts</label><input type="text" id="kitParts"></div>
    <div class="form-group"><label>Visit Date</label><input type="datetime-local" id="visitDate"></div>
    <div class="form-group"><label>Company</label><input type="text" id="companyName"></div>
    <div class="form-group"><label>Address</label><textarea id="address" rows="2"></textarea></div>

    <div id="copyHint" class="copy-hint">✓ Copied!</div>
    <button id="generateBtn">Generate & Copy</button>

    <textarea id="finalContent" readonly placeholder="Output will appear here..."></textarea>
</div>

<script>
    // Toggle breakdown fields
    document.getElementById('serviceType').addEventListener('change', function() {
        const isBD = this.value.toLowerCase().includes('breakdown') || this.value.toLowerCase().includes('bd');
        document.getElementById('breakdownSection').style.display = isBD ? 'block' : 'none'; [cite: 38, 39]
    });

    function formatDT(str) {
        if(!str) return "N/A";
        const d = new Date(str);
        return isNaN(d) ? "N/A" : d.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); [cite: 40, 41, 43]
    }

    // Main Function
    document.getElementById('generateBtn').addEventListener('click', async function() {
        const model = document.getElementById('genModel').value;
        const sn = document.getElementById('serialNumber').value; [cite: 43, 44]
        const service = document.getElementById('serviceType').value;
        const outputField = document.getElementById('finalContent');
        
        let text = `Please help to arrange visit.\n-------------------\n`;
        text += `Model: ${model || 'N/A'}\nS/N: ${sn || 'N/A'}\nCategory: ${service || 'N/A'}\n`; [cite: 47, 48]
        text += `Visit: ${formatDT(document.getElementById('visitDate').value)}\n`; [cite: 52]
        text += `Company: ${document.getElementById('companyName').value || 'N/A'}\n-------------------`; [cite: 53]

        outputField.value = text; [cite: 57]

        // IPHONE COMPATIBLE COPY LOGIC
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text); [cite: 58]
            showSuccess();
        } else {
            // Fallback for non-HTTPS or older iOS
            outputField.focus();
            outputField.setSelectionRange(0, 9999); 
            try {
                document.execCommand('copy'); [cite: 60]
                showSuccess();
            } catch (err) {
                alert("Please manually copy the highlighted text.");
            }
        }
    });

    function showSuccess() {
        const hint = document.getElementById('copyHint');
        hint.style.display = 'block';
        setTimeout(() => hint.style.display = 'none', 2000); [cite: 59]
    }
</script>
</body>
</html>
